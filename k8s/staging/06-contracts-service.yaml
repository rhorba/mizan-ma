apiVersion: apps/v1
kind: Deployment
metadata:
  name: contracts-service
  namespace: mizan-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contracts-service
  template:
    metadata:
      labels:
        app: contracts-service
    spec:
      containers:
        - name: contracts-service
          image: mizan-ma-contracts-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: mizan-config
            - secretRef:
                name: mizan-secrets
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: contracts-service
  namespace: mizan-staging
spec:
  selector:
    app: contracts-service
  ports:
    - port: 8083
      targetPort: 8083
