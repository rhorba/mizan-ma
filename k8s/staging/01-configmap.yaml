apiVersion: v1
kind: ConfigMap
metadata:
  name: mizan-config
  namespace: mizan-staging
data:
  POSTGRES_DB: "auth_db"
  POSTGRES_USER: "mizan_user"
  AUTH_DB_URL: "jdbc:postgresql://postgres:5432/auth_db"
  USER_DB_URL: "jdbc:postgresql://postgres:5432/user_db"
  CONTRACTS_DB_URL: "jdbc:postgresql://postgres:5432/contracts_db"
  JWT_EXPIRATION_MS: "3600000"
  JWT_REFRESH_EXPIRATION_MS: "604800000"
  ANTHROPIC_MODEL: "claude-sonnet-4-6"
  R2_BUCKET_NAME: "mizan-contracts"
  CONTRACT_MAX_FILE_SIZE_MB: "20"
  AI_ANALYSIS_SERVICE_URL: "http://ai-analysis-service:8084"
  AUTH_SERVICE_URL: "http://auth-service:8081"
  USER_SERVICE_URL: "http://user-service:8082"
  CONTRACTS_SERVICE_URL: "http://contracts-service:8083"
  FRONTEND_ORIGIN: "https://staging.mizan.ma"
  SMTP_HOST: "changeme-smtp-host"
  SMTP_PORT: "587"
  SMTP_AUTH: "true"
  SMTP_STARTTLS: "true"
  MAIL_FROM_ADDRESS: "noreply@mizan.ma"
  EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS: "86400000"
  VERIFICATION_RESEND_COOLDOWN_MS: "60000"
  # Never "true" outside local dev — logs a live, usable verification link.
  LOG_VERIFICATION_LINKS: "false"
