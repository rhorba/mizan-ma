apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: mizan-staging
data:
  01-create-databases.sql: |
    -- POSTGRES_DB (auth_db) is created automatically by the postgres image.
    -- This script creates the remaining logical databases (docs/architecture-mizan.md §3).
    CREATE DATABASE user_db;
    CREATE DATABASE contracts_db;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: mizan-staging
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: mizan-config
            - secretRef:
                name: mizan-secrets
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mizan-staging
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
