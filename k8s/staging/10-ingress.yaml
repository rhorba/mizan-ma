apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mizan-ingress
  namespace: mizan-staging
spec:
  ingressClassName: nginx
  rules:
    - host: staging.mizan.ma
      http:
        paths:
          # No rewrite: Spring Cloud Gateway's own routes expect the full /api/v1/...
          # path unchanged (e.g. Path=/api/v1/auth/**), so the prefix must be forwarded as-is.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
