server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: contracts-service
  datasource:
    url: ${CONTRACTS_DB_URL:jdbc:postgresql://localhost:5432/contracts_db}
    username: ${POSTGRES_USER:mizan_user}
    password: ${POSTGRES_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: ${CONTRACT_MAX_FILE_SIZE_MB:20}MB
      max-request-size: ${CONTRACT_MAX_FILE_SIZE_MB:20}MB

r2:
  endpoint-url: ${R2_ENDPOINT_URL}
  access-key-id: ${R2_ACCESS_KEY_ID}
  secret-access-key: ${R2_SECRET_ACCESS_KEY}
  bucket-name: ${R2_BUCKET_NAME}

contracts:
  max-file-size-mb: ${CONTRACT_MAX_FILE_SIZE_MB:20}

ai-analysis:
  service-url: ${AI_ANALYSIS_SERVICE_URL:http://localhost:8084}

internal:
  service-token: ${INTERNAL_SERVICE_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
