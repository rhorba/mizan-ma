name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-lint:
    name: Backend / Lint (Spotless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B spotless:check

  backend-test:
    name: Backend / Test + Coverage Gate (80%)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B verify

  frontend-lint:
    name: Frontend / Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx ng lint

  frontend-test:
    name: Frontend / Test + Coverage Gate (80%)
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx ng test --no-watch

  security-scan:
    name: Security Scan (Semgrep, Trivy SCA, Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secrets detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy filesystem scan (dependency CVEs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - name: Semgrep (SAST)
        run: |
          pip install semgrep
          semgrep scan --config auto --severity ERROR --error

  build-backend:
    name: Build & Scan Backend Images
    runs-on: ubuntu-latest
    needs: [backend-test, security-scan]
    strategy:
      matrix:
        include:
          - service: gateway
            port: 8080
          - service: auth-service
            port: 8081
          - service: user-service
            port: 8082
          - service: contracts-service
            port: 8083
          - service: ai-analysis-service
            port: 8084
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }} image
        run: |
          docker build -f docker/backend.Dockerfile \
            --build-arg SERVICE=${{ matrix.service }} \
            --build-arg PORT=${{ matrix.port }} \
            -t mizan-${{ matrix.service }}:${{ github.sha }} .
      - name: Trivy image scan (container CVEs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: mizan-${{ matrix.service }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  build-frontend:
    name: Build & Scan Frontend Image
    runs-on: ubuntu-latest
    needs: [frontend-test, security-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t mizan-frontend:${{ github.sha }} .
      - name: Trivy image scan (container CVEs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: mizan-frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
