server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: ai-analysis-service

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-sonnet-5}
  base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}

internal:
  service-token: ${INTERNAL_SERVICE_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
