services:
  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: s3
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
    volumes:
      - ./docker/localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: auth-service
        PORT: 8081
    environment:
      AUTH_DB_URL: ${AUTH_DB_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_STARTTLS: ${SMTP_STARTTLS}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS: ${EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS}
      VERIFICATION_RESEND_COOLDOWN_MS: ${VERIFICATION_RESEND_COOLDOWN_MS}
      LOG_VERIFICATION_LINKS: ${LOG_VERIFICATION_LINKS}
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: user-service
        PORT: 8082
    environment:
      USER_DB_URL: ${USER_DB_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  contracts-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: contracts-service
        PORT: 8083
    environment:
      CONTRACTS_DB_URL: ${CONTRACTS_DB_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
      CONTRACT_MAX_FILE_SIZE_MB: ${CONTRACT_MAX_FILE_SIZE_MB}
      AI_ANALYSIS_SERVICE_URL: http://ai-analysis-service:8084
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  ai-analysis-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: ai-analysis-service
        PORT: 8084
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}

  gateway:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        SERVICE: gateway
        PORT: 8080
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      CONTRACTS_SERVICE_URL: http://contracts-service:8083
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - user-service
      - contracts-service

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    ports:
      - "4200:80"
    depends_on:
      - gateway

volumes:
  pgdata:
